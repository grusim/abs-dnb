version: 2
updates:
  # GitHub Actions — keeps the SHA-pinned actions in publish.yml current
  # (Dependabot bumps the pin + the `# vX.Y.Z` comment together).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]

  # Base image in the Dockerfile (python:3.12-alpine)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
