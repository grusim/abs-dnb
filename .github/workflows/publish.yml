name: publish

# Builds and publishes a multi-arch, provenance + SBOM attested, cosign-signed
# image to Docker Hub and cuts a GitHub Release on every v* tag. Requires repo
# secret DOCKERHUB_TOKEN (a read+write scoped PAT) to be set before tagging.
on:
  push:
    tags:
      - "v*"

env:
  IMAGE: docker.io/grusim/abs-dnb

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the tag
      id-token: write # cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: grusim
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Release is cut for the triggering tag; notes auto-generated from
          # commits/PRs since the previous tag, plus the image coordinates.
          generate_release_notes: true
          body: |
            **Docker image:** `${{ env.IMAGE }}:${{ steps.meta.outputs.version }}`
            **Digest:** `${{ steps.build.outputs.digest }}`

            Multi-arch (`linux/amd64`, `linux/arm64`), provenance + SBOM attested, cosign-signed.

            Verify the signature:
            ```bash
            cosign verify ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} \
              --certificate-identity-regexp 'github.com/grusim/abs-dnb' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
            ```
