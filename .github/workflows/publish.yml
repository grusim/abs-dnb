name: publish

# Builds and publishes a multi-arch, provenance + SBOM attested, cosign-signed
# image to Docker Hub and cuts a GitHub Release on every v* tag. Requires repo
# secret DOCKERHUB_TOKEN (a read+write scoped PAT) to be set before tagging.
on:
  push:
    tags:
      - "v*"

env:
  IMAGE: docker.io/grusim/abs-dnb

jobs:
  # Gate the publish on a green test run — a tagged-but-broken commit must not ship.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the tag
      id-token: write # cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: grusim
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign image (keyless, GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          # Release is cut for the triggering tag; notes auto-generated from
          # commits/PRs since the previous tag, plus the image coordinates.
          generate_release_notes: true
          body: |
            **Docker image:** `${{ env.IMAGE }}:${{ steps.meta.outputs.version }}`
            **Digest:** `${{ steps.build.outputs.digest }}`

            Multi-arch (`linux/amd64`, `linux/arm64`), provenance + SBOM attested, cosign-signed.

            Verify the signature:
            ```bash
            cosign verify ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} \
              --certificate-identity-regexp 'github.com/grusim/abs-dnb' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
            ```
