name: publish

# Builds and publishes a multi-arch, provenance + SBOM attested, cosign-signed
# image to Docker Hub and cuts a GitHub Release on every v* tag. Requires repo
# secret DOCKERHUB_TOKEN (a read+write scoped PAT) to be set before tagging.
on:
  push:
    tags:
      - "v*"

env:
  IMAGE: docker.io/grusim/abs-dnb

jobs:
  # Gate the publish on a green test run — a tagged-but-broken commit must not ship.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the tag
      id-token: write # cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: grusim
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # Release is cut for the triggering tag; notes auto-generated from
          # commits/PRs since the previous tag, plus the image coordinates.
          generate_release_notes: true
          body: |
            **Docker image:** `${{ env.IMAGE }}:${{ steps.meta.outputs.version }}`
            **Digest:** `${{ steps.build.outputs.digest }}`

            Multi-arch (`linux/amd64`, `linux/arm64`), provenance + SBOM attested, cosign-signed.

            Verify the signature:
            ```bash
            cosign verify ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} \
              --certificate-identity-regexp 'github.com/grusim/abs-dnb' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
            ```
