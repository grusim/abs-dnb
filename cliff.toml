# git-cliff configuration — generate CHANGELOG.md from Conventional Commits.
# Regenerate before tagging a release:
#   uvx git-cliff --tag vX.Y.Z -o CHANGELOG.md
# Then eyeball/edit the output (a changelog is for humans) and commit it.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

Format: [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
Versioning: [Semantic Versioning](https://semver.org/)
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Ordered Keep-a-Changelog buckets; the <!-- N --> markers set order and are
# stripped by `striptags` in the body template.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^refactor", group = "<!-- 1 -->Changed" },
  { message = "^perf", group = "<!-- 1 -->Changed" },
  { message = "^fix", group = "<!-- 2 -->Fixed" },
  { message = "^.*security", group = "<!-- 3 -->Security" },
  { body = ".*security", group = "<!-- 3 -->Security" },
  { message = "^docs?", group = "<!-- 4 -->Documentation" },
  { message = "^build", group = "<!-- 5 -->Build & CI" },
  { message = "^ci", group = "<!-- 5 -->Build & CI" },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
]
filter_commits = false
# `v` optional so it matches both `v0.1.0` tags and git-cliff's bare --bump
# version (0.1.0) on the first release, when there is no prior tag to infer from.
tag_pattern = "v?[0-9].*"
sort_commits = "oldest"
