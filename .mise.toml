# mise-en-place: pinned dev tools + task runner. https://mise.jdx.dev
# Activate:  mise install   (then `mise run <task>`)
#
# Python is intentionally NOT listed here: uv owns the interpreter (it fetches
# CPython 3.14 per requires-python during `uv sync`). Letting mise also install
# Python is redundant and currently hits a python-build-standalone artifact bug
# on 3.14 (freethreaded build missing a `lib` dir). mise manages only the tools
# uv does not — git-cliff (and uv itself).
[tools]
uv = "latest"
git-cliff = "2.13.1"

[tasks.setup]
description = "Install dependencies and git hooks"
run = [
  "uv sync",
  "uv run pre-commit install --install-hooks",
]

[tasks.test]
description = "Run the test suite"
run = "uv run pytest"

[tasks.format]
description = "Format and autofix the codebase (ruff)"
run = [
  "uv run ruff format .",
  "uv run ruff check --fix .",
]

[tasks.lint]
description = "Run all pre-commit checks (lint, format, secret scan)"
run = "uv run pre-commit run --all-files"

[tasks.changelog]
description = "Regenerate CHANGELOG.md (auto-bumps version from commits)"
run = "git-cliff --bump -o CHANGELOG.md"
